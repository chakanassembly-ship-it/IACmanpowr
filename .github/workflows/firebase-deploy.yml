name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node (LTS stable)
        uses: actions/setup-node@v3
        with:
          node-version: 20   # 🔥 change from 18 → 20

      - name: Install dependencies (safe)
        run: |
          npm install --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase
        run: npx firebase-tools deploy --only hosting --token "$FIREBASE_TOKEN"